# xhh-TL 默认配置（随仓库更新）
# 用户请改 config/config.yaml（不会被 git 覆盖）
# 首次启动会自动从本文件复制生成 config.yaml

Tl: true
# 全局倍率微调：1.0=模板推荐倍率；可调 0.8~1.5，最终 scale 上限 2.5
render_scale: 1.0
# 体力卡片样式（仅原神/星铁生效；绝区零始终经典）
#   classic  = 经典多合一卡片（默认）
#   portrait = 大立绘卡片（右侧角色立绘，原神抽原神、星铁抽星铁）
tl_card_style: classic
# 立绘卡的立绘目录（tl_card_style=portrait 时生效）
# 默认用 miao-plugin 角色面板图，按游戏自动过滤原神/星铁角色
# 结构：子文件夹=角色名，内含图片随机抽取。也可改成自己的图库或绝对路径
tl_portrait_folder: plugins/miao-plugin/resources/profile/normal-character
# 立绘卡的底图（tl_card_style=portrait 时生效）
# 支持：单张图片文件 / 目录（目录则随机抽一张）；相对 Yunzai 根或绝对路径
tl_portrait_bg: plugins/xhh-TL/resources/stat/imgs/bg1.png
tl_priority: -999
show_all_bindings: true
tl_render_mode: merge
tl_merge_uids_per_image: 0
tl_uids_per_image: 2
tl_cards_per_msg: 3
abyss_priority: -98
all_abyss: true
all_abyss_render_mode: desktop
role_combat: true
# 剧诗/小剧诗/原神全部深渊 背景（目录或单张图）
# 默认用插件自带图，Linux/Win 通用相对路径：
#   plugins/xhh-TL/resources/stat/imgs/bg1.png
# 也可改成角色面板目录（子文件夹=角色名，随机抽图），例如：
#   plugins/miao-plugin/resources/profile/normal-character
# Windows 也可用绝对路径：D:/Yunzai/plugins/...
role_combat_bg_folder: plugins/xhh-TL/resources/stat/imgs/bg1.png
gs_all_abyss: true
# 原神全部深渊毛玻璃主题：light=初版浅色玻璃 / dark=深色半透明
gs_all_abyss_theme: light

# 帮助图背景（#小火花帮助）
# 默认插件自带 bg2.png，Linux/Win 通用相对路径：
#   plugins/xhh-TL/resources/stat/imgs/bg2.png
# 可改成任意单张图，也支持目录（随机抽一张）
# Windows 也可用绝对路径：D:/Yunzai/plugins/xhh-TL/resources/stat/imgs/bg2.png
help_bg: plugins/xhh-TL/resources/stat/imgs/bg2.png

# SToken/CK 搜索路径（多行，按优先级）。留空则用默认 xhh / 逍遥 / 本插件
# stoken_paths: |
#   plugins/xhh/data/Stoken
#   plugins/xiaoyao-cvs-plugin/data/yaml
#   plugins/xhh-TL/data/Stoken
stoken_paths: ""

# data/tmp 定时清理
tmp_clean_enable: true
tmp_clean_cron: "17 4 * * *"
tmp_clean_max_age_hours: 24

# ===== 体力阈值推送 =====
# 用户在群里各自设定阈值：原神看原粹树脂、星铁看开拓力，达到即在该群@用户并发体力图
# 达到阈值只提醒一次，体力回落到阈值以下后自动重新监控
resin_push_enable: true
# 检查频率（cron）。默认每 10 分钟一次；不建议太频繁以免触发米游社风控
resin_push_cron: "*/10 * * * *"
